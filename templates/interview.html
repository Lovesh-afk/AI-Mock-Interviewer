<!DOCTYPE html>
<html>
<head>
    <title>Interview - {{ role }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">🎯 AI Mock Interviewer</span>
        <span class="navbar-text text-white">{{ role }} · {{ difficulty }}</span>
    </div>
</nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <small class="text-muted">Question {{ number }} of {{ total }}</small>
                        <small class="text-muted">{{ ((number / total) * 100) | int }}% complete</small>
                    </div>
                    <div class="progress" style="height:8px;">
                        <div class="progress-bar bg-dark" style="width: {{ (number / total) * 100 }}%"></div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-body p-4">
                        <span class="badge bg-dark mb-3">Question {{ number }}</span>
                        <h5 class="card-title">{{ question }}</h5>
                    </div>
                </div>

                <div class="card shadow">
                    <div class="card-body p-4">
                        <form method="POST" action="/answer">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Your Answer</label>
                                <textarea name="answer" class="form-control" rows="6" placeholder="Type your answer here..." required></textarea>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-dark btn-lg">Submit Answer →</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
