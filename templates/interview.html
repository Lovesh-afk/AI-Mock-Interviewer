<!DOCTYPE html>
<html>
<head>
    <title>Interview - {{ role }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #timer {
            font-size: 2rem;
            font-weight: bold;
        }
        .timer-warning { color: orange; }
        .timer-danger { color: red; }
        .timer-normal { color: inherit; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand fw-bold">🎯 AI Mock Interviewer</span>
            <span class="navbar-text text-white">{{ role }} · {{ difficulty }}</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">

                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <small class="text-muted">Question {{ number }} of {{ total }}</small>
                        <small class="text-muted">{{ ((number / total) * 100) | int }}% complete</small>
                    </div>
                    <div class="progress" style="height:8px;">
                        <div class="progress-bar bg-dark" style="width: {{ (number / total) * 100 }}%"></div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="badge bg-dark">Question {{ number }}</span>
                            <div id="timer" class="timer-normal">3:00</div>
                        </div>
                        <h5 class="card-title">{{ question }}</h5>
                    </div>
                </div>

                <div class="card shadow">
                    <div class="card-body p-4">
                        <form method="POST" action="/answer" id="answerForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Your Answer</label>
                                <textarea name="answer" class="form-control" rows="6" placeholder="Type your answer here..." required id="answerBox"></textarea>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-dark btn-lg">Submit Answer →</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let timeLeft = 180; // 3 minutes in seconds
        const timerEl = document.getElementById("timer");
        const form = document.getElementById("answerForm");
        const answerBox = document.getElementById("answerBox");

        const interval = setInterval(() => {
            timeLeft--;

            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerEl.textContent = `${minutes}:${seconds.toString().padStart(2, "0")}`;

            // Change color based on time left
            if (timeLeft <= 30) {
                timerEl.className = "timer-danger";
            } else if (timeLeft <= 60) {
                timerEl.className = "timer-warning";
            }

            // Auto submit when time runs out
            if (timeLeft <= 0) {
                clearInterval(interval);
                if (answerBox.value.trim() === "") {
                    answerBox.value = "No answer provided (time ran out)";
                }
                form.submit();
            }
        }, 1000);
    </script>
</body>
</html>
