<!DOCTYPE html>
<html>
<head>
    <title>AI Mock Interviewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand fw-bold">🎯 AI Mock Interviewer</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center mb-2">Practice Interviews</h2>
                        <p class="text-center text-muted mb-4">Get AI-powered feedback on your answers</p>

                        {% if error %}
                            <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Job Role</label>
                                <input type="text" name="role" class="form-control form-control-lg" placeholder="e.g. Python Backend Developer, Data Analyst..." required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-dark btn-lg">Start Interview →</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="row mt-4 text-center">
                    <div class="col-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h4>5</h4>
                                <small class="text-muted">Questions</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h4>AI</h4>
                                <small class="text-muted">Feedback</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h4>Free</h4>
                                <small class="text-muted">Forever</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
