<!DOCTYPE html>
<html>
<head>
    <title>AI Mock Interviewer</title>
</head>
<body>
    <h1>🎯 AI Mock Interviewer</h1>
    <p>Practice interviews and get instant AI feedback on your answers!</p>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="role" placeholder="Enter job role (e.g. Python Backend Developer)" style="width:350px; padding:10px; font-size:16px;">
        <br><br>
        <button type="submit" style="padding:10px 20px; font-size:16px;">Start Interview</button>
    </form>
</body>
</html>
